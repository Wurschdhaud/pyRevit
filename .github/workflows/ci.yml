name: pyRevit CI

on:
  pull_request:
    types: [opened, reopened]
    branches: [develop, master]
    paths:
      - 'bin/**'
      - 'dev/**'
      - 'extensions/**'
      - 'pyrevitlib/**'
      - 'release/**'
      - 'site-packages/**'
  push:
    branches: [develop, master]
    tags: ['v*']
    paths:
      - 'bin/**'
      - 'dev/**'
      - 'extensions/**'
      - 'pyrevitlib/**'
      - 'release/**'
      - 'site-packages/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  MainRepo: "pyrevitlabs/pyRevit"

concurrency:
  group: pyrevit-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Prepare Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pipenv'

      - name: Prepare pipenv
        run: |
          pip install pipenv
          pipenv sync --dev

      - name: Prepare .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.USERPROFILE }}\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Prepare msbuild
        uses: microsoft/setup-msbuild@v3

      - name: Check Build Environment
        if: github.repository == env.MainRepo
        run: pipenv run pyrevit check

      - name: Update Copyright Info
        if: github.repository == env.MainRepo
        run: pipenv run pyrevit set year

      - name: Update Build Info (WIP)
        if: github.repository == env.MainRepo && github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: pipenv run pyrevit set build wip

      - name: Update Build Info (Release)
        if: github.repository == env.MainRepo && github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        run: pipenv run pyrevit set build release

      - name: Publish Build Info
        if: github.repository == env.MainRepo
        run: pipenv run pyrevit set products

      - name: Build Products
        run: pipenv run pyrevit build products

      - name: Verify LibGit2 native DLL in bin
        shell: pwsh
        run: |
          & "${{ github.workspace }}/release/Verify-LibGit2NativeDll.ps1"

      - name: Build Installers
        run: pipenv run pyrevit build installers

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-build-${{ github.sha }}
          path: |
            bin/**
            dist/**
