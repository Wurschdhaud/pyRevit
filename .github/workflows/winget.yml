name: Update Winget Package  
  
on:  
  release:  
    types: [published]  
  workflow_dispatch:  
  
jobs:  
  update-winget:  
    runs-on: windows-latest  
    steps:  
      - name: Checkout pyRevit repository  
        uses: actions/checkout@v5  
        with:  
          fetch-depth: 0  
  
      - name: Get release info  
        id: release  
        uses: actions/github-script@v7  
        with:  
          script: |  
            const release = await github.rest.repos.getRelease({  
              owner: context.repo.owner,  
              repo: context.repo.repo,  
              release_id: context.event.release.id  
            });  
            return {  
              tag_name: release.data.tag_name,  
              version: release.data.tag_name.replace('v', ''),  
              html_url: release.data.html_url  
            };  
  
      - name: Install wingetcreate  
        run: |  
          pip install wingetcreate  
  
      - name: Update Winget manifest  
        env:  
          WINGET_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}  
        run: |  
          # Get the installer URLs from the release  
          $releaseVersion = "${{ steps.release.outputs.version }}"  
          $baseUrl = "https://github.com/pyrevitlabs/pyRevit/releases/download/v${releaseVersion}/"  
            
          # Update the Winget package  
          wingetcreate update pyRevit.pyRevit `  
            --version $releaseVersion `  
            --urls "${baseUrl}pyRevit_${releaseVersion}_signed.exe" `  
            --submit-pr `  
            --token $env:WINGET_TOKEN