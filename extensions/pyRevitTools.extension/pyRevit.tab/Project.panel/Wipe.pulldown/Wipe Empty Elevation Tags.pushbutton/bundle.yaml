title:
  en_us: Wipe Empty Elevation Tags
  ko: 빈 입면 태그 삭제
  fr_fr: Supprimer les étiquettes d'élévation vides
  ru: Очистить пустые марки уровней
  chinese_s: 清除空的立面标记
  es_es: Limpiar etiquetas de elevación vacías
  de_de: Lösche leere Ansichtsbeschriftungen
  pt_br: Remover Identificadores de Elevação Vazios
tooltip:
  en_us: >-
    Generally if all elevations creates by an elevation tag  are deleted from the model, the empty elevation tag still  remains in its location. This script will delete all  empty elevation tags from the model
  ko: 일반적으로 입면 태그로 생성된 모든 입면도가 모델에서 삭제되면 빈 입면 태그가 위치에 남아 있습니다. 이 스크립트는 모델에서 모든 빈 입면 태그를 삭제합니다.
  fr_fr: >-
    En général, si toutes les élévations créées par une  étiquette d'élévation sont supprimées du modèle,  l'étiquette d'élévation vide reste toujours à son  emplacement. Ce script supprimera toutes les  étiquettes d'élévation vides du modèle
  ru: >-
    Как правило, если все марки, созданные с помощью марки  уровней, удаляются из модели. Данный скрипт удалит из  модели все пустые марки уровней.
  chinese_s: 通常，如果由立面标记创建的所有立面图都从模型中删除，空的立面标记仍会保留在原位。此脚本将从模型中删除所有空的立面标记
  es_es: >-
    Generalmente, si todas las elevaciones creadas por una etiqueta de elevación se eliminan del modelo, la etiqueta de elevación vacía aún permanece en su ubicación. Este script eliminará todas las etiquetas de elevación vacías del modelo
  de_de: >-
    Wenn alle Ansichten gelöscht werden, die durch eine  Ansichtsbeschriftung generiert wurden, dann bleibt die  leere Ansichtsbeschriftung übrig. Dieses Skript löscht alle  leeren Ansichtsbeschriftungen im Modell.
  pt_br: >-
    Geralmente, se todas as elevações criadas por um identificador de elevação forem excluídas do modelo, o identificador de elevação vazio ainda permanecerá em seu local. Este script excluirá todos os identificadores de elevação vazios do modelo
