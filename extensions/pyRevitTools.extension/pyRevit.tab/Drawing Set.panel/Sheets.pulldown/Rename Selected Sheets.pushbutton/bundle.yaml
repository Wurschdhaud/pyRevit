title:
  en_us: Rename Selected Sheets
  fr_fr: Renommer les Noms des Feuilles Sélectionnées
  ru: Переименовать выбранные листы
  chinese_s: 重命名选定图纸
  es_es: Renombrar hojas seleccionadas
  de_de: Gewählte Pläne umbenennen
  pt_br: Renomear Folhas Selecionadas
tooltip:
  en_us: >-
    Batch rename selected sheet names using find & replace, prefix, suffix,
    or case change
  fr_fr: >-
    Renommer en lot les feuilles sélectionnées (rechercher/remplacer, préfixe,
    suffixe ou casse)
  ru: >-
    Пакетное переименование выбранных листов (поиск и замена, префикс,
    суффикс или регистр)
  chinese_s: 批量重命名选定图纸（查找替换、前缀、后缀或大小写）
  es_es: >-
    Renombrar en lote las hojas seleccionadas (buscar y reemplazar, prefijo,
    sufijo o mayúsculas/minúsculas)
  de_de: >-
    Gewählte Pläne im Batch umbenennen (Suchen & Ersetzen, Präfix, Suffix
    oder Groß-/Kleinschreibung)
  pt_br: >-
    Renomear em lote as folhas selecionadas (localizar e substituir, prefixo,
    sufixo ou alteração de maiúsculas/minúsculas)
