title:
  en_us: Increment Selected Sheet Numbers
  ko: 선택한 시트 번호 증가
  fr_fr: Incrémenter les Numéros des Feuilles Sélectionnées
  ru: Увеличить номер выделенного листа
  chinese_s: 递增选定图纸编号
  es_es: Incrementar números de hojas seleccionadas
  de_de: Erhöhe die ausgewählten Plannummern
  pt_br: Aumentar Números das Folhas Selecionadas
tooltip:
  en_us: >-
    Increases the sheet number of the selected sheets by one. The sheet name
    change will be printed if logging is set to Verbose in pyRevit settings
  ko: 선택한 시트의 시트 번호를 하나 증가시킵니다. pyRevit 설정에서 로깅이 자세히로 설정된 경우 시트 이름 변경이 출력됩니다.
  fr_fr: >-
    Augmente de un le numéro de feuille des feuilles sélectionnées. Le
    changement de nom de feuille sera imprimé si la journalisation est définie
    sur Verbose dans les paramètres pyRevit
  ru: >-
    Увеличивает номер листа на один. Изменение листа будет выведено,  если в настройках pyRevit ведение журнала установлено значение Verbose.
  chinese_s: 将所选图纸的图纸编号加一。如果在 pyRevit 设置中将日志记录设置为“详细”，将打印图纸名称更改
  es_es: >-
    Aumenta el número de hoja de las hojas seleccionadas en uno. El cambio
    de nombre de hoja se imprimirá si el registro está configurado en Verbose en la configuración de pyRevit
  de_de: >-
    Erhöht die Plannummer des ausgewählten Plans um eins. Die Änderung des Plannamens
    wird gedruckt, wenn die Protokollierung in den pyRevit-Einstellungen auf Verbose eingestellt ist.
  pt_br: >-
    Aumenta o número da folha das folhas selecionadas em um. a alteração do nome da folha 
    será impressa se o log estiver definido como Verbose nas configurações do pyRevit.
