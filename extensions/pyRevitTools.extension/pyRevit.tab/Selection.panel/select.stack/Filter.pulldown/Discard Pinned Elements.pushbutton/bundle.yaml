title:
  en_us: Discard Pinned Elements
  fr_fr: Enlève les éléments épinglés
  ru: Отбросить прикрепленные элементы
  chinese_s: 排除锁定图元
  es_es: Descartar elementos fijados
  de_de: Gepinnte Elemente von der aktuellen Auswahl ausschliessen
  pt_br: Descartar Elementos Fixados
tooltip:
  en_us: >-
    Discards (not delete) pinned elements from current selection.
    If nothing is selected, pick a region to filter from.
  fr_fr: >-
    Enlève (ne supprime pas) les éléments épinglés de la sélection courante.
    Si rien n'est sélectionné, délimitez une zone à filtrer.
  ru: >-
    Отбросить (не удалить) прикрепленные элементы с текущего выделения.
    Если ничего не выбрано, выберите область для фильтрации.
  chinese_s: >-
    从当前选择中排除（非删除）已锁定的图元。
    若未选择任何内容，则框选区域进行过滤。
  es_es: >-
    Descarta (no elimina) elementos fijados de la selección actual.
    Si no hay nada seleccionado, delimite una región para filtrar.
  de_de: >-
    Die aktuelle Elementauswahl wird so vermindert, dass keine gepinnten Elemente
    mehr in der Auswahl vorhanden sind. Die Elemente werden nicht gelöscht, sondern
    nur aus der aktuellen Auswahl entfernt.
    Wenn nichts ausgewählt ist, kann ein Bereich zum Filtern gewählt werden.
  pt_br: >-
    Descarta (não exclui) elementos fixados da seleção atual.
    Se nada estiver selecionado, selecione uma região para filtrar.
context:
  any:
    - selection
    - active-plan-view
    - active-section-view
    - active-3d-view
    - active-elevation-view
