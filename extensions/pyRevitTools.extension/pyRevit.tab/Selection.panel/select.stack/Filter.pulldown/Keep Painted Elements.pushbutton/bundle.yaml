title:
  en_us: Keep Painted Elements
  fr_fr: Conserve les éléments peints
  ru: Удержать раскрашенные элементы
  chinese_s: 保留已涂刷图元
  es_es: Mantener elementos pintados
  de_de: Nur Elemente mit gefärbten Flächen in aktueller Auswahl belassen
  pt_br: Manter Elementos Pintados
tooltip:
  en_us: >-
    Keeps elements with painted faces in current selection and filters everything else out.
    If nothing is selected, pick a region to filter from.
  fr_fr: >-
    Conserve les éléments avec des faces peintes dans la sélection actuelle et filtre tout le reste.
    Si rien n'est sélectionné, délimitez une zone à filtrer.
  ru: >-
    Удерживает элементы с раскрашенными гранями в текущем выделении и отфильтровывает всё остальное.
    Если ничего не выбрано, выберите область для фильтрации.
  chinese_s: >-
    在当前选择中保留表面已涂刷的图元，并过滤掉其他所有图元。
    若未选择任何内容，则框选区域进行过滤。
  es_es: >-
    Mantiene elementos con caras pintadas en la selección actual y filtra todo lo demás.
    Si no hay nada seleccionado, delimite una región para filtrar.
  de_de: >-
    Die aktuelle Elementauswahl wird so vermindert, dass nur Elemente in der Auswahl
    verbleiben, die eingefärbte Flächen haben. Die Elemente werden nicht gelöscht,
    sondern nur aus der aktuellen Auswahl entfernt.
    Wenn nichts ausgewählt ist, kann ein Bereich zum Filtern gewählt werden.
  pt_br: >-
    Mantém elementos com faces pintadas na seleção atual e filtra todo o resto.
    Se nada estiver selecionado, selecione uma região para filtrar.
context:
  any:
    - selection
    - active-plan-view
    - active-section-view
    - active-3d-view
    - active-elevation-view
