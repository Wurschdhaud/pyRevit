title:
  en_us: Elements Hosted On Linked Model
  fr_fr: Eléments hébergés sur un modèle lié
  ru: Удержать элементы рамещенные на связанной модели
  chinese_s: 基于链接模型的图元
  es_es: Elementos alojados en modelo vinculado
  de_de: Aufwahl auf Elemente mit verknüpftem Modell als Host reduzieren
  pt_br: Elementos Hospedados em Modelo Vinculado
tooltip:
  en_us: >-
    Keeps elements hosted on a linked model surface in current selection.
    If nothing is selected, pick a region to filter from.
  fr_fr: >-
    Conserve les éléments hébergés sur une surface de modèle lié dans la sélection actuelle.
    Si rien n'est sélectionné, délimitez une zone à filtrer.
  ru: >-
    Сохраняет элементы, размещённые на поверхности связанной модели, в текущем выделении.
    Если ничего не выбрано, выберите область для фильтрации.
  chinese_s: >-
    在当前选择中保留基于链接模型表面的图元。
    若未选择任何内容，则框选区域进行过滤。
  es_es: >-
    Mantiene los elementos alojados en una superficie de modelo vinculado en la selección actual.
    Si no hay nada seleccionado, delimite una región para filtrar.
  de_de: >-
    Behält nur Elemente in der Auswahl, die auf einer Fläche eines verknüpften Modells
    gehostet sind. Die Elemente werden nicht gelöscht, sondern nur aus der aktuellen
    Auswahl entfernt.
    Wenn nichts ausgewählt ist, kann ein Bereich zum Filtern gewählt werden.
  pt_br: >-
    Mantém os elementos hospedados em uma superfície de modelo vinculado na seleção atual.
    Se nada estiver selecionado, selecione uma região para filtrar.
context:
  any:
    - selection
    - active-plan-view
    - active-section-view
    - active-3d-view
    - active-elevation-view
