title:
  en_us: Custom Properties
  fr_fr: Propriétés personnalisées
  ru: Свойства элемента
  chinese_s: 自定义属性
  es_es: Propiedades personalizadas
  de_de: Benutzerdefinierte Eigenschaften
  pt_br: Propriedades personalizadas
tooltip:
  en_us: >-
    Toggle the Custom Properties dockable pane to inspect and edit
    parameters of the selected Revit element.

    Shift-Click:

    Open configuration to add or remove tracked parameters and
    enable or disable the pane on startup.
  fr_fr: >-
    Afficher/masquer le panneau Propriétés personnalisées pour inspecter
    et modifier les paramètres de l'élément Revit sélectionné.

    Shift-Click:

    Ouvrir la configuration pour ajouter ou supprimer des paramètres
    suivis et activer ou désactiver le panneau au démarrage.
  ru: >-
    Переключить панель «Свойства элемента» для просмотра и
    редактирования параметров выбранного элемента Revit.

    Shift-Click:

    Открыть конфигурацию для добавления или удаления отслеживаемых
    параметров и включения или отключения панели при запуске.
  chinese_s: >-
    切换自定义属性停靠面板，检查和编辑选定 Revit 元素的参数。

    Shift-Click:

    打开配置以添加或删除跟踪参数，并启用或禁用启动时的面板。
  es_es: >-
    Mostrar/ocultar el panel Propiedades personalizadas para inspeccionar
    y editar los parámetros del elemento Revit seleccionado.

    Shift-Click:

    Abrir la configuración para agregar o quitar parámetros rastreados
    y habilitar o deshabilitar el panel al inicio.
  de_de: >-
    Das andockbare Fenster „Benutzerdefinierte Eigenschaften"
    ein-/ausblenden, um Parameter des ausgewählten Revit-Elements
    zu inspizieren und zu bearbeiten.

    Shift-Click:

    Konfiguration öffnen, um nachverfolgte Parameter hinzuzufügen
    oder zu entfernen und das Fenster beim Start zu aktivieren
    oder zu deaktivieren.
  pt_br: >-
    Mostrar/ocultar o painel Propriedades Personalizadas para inspecionar
    e editar os parâmetros do elemento Revit selecionado.

    Shift-Clique:

    Abrir configuração para adicionar ou remover parâmetros rastreados
    e habilitar ou desabilitar o painel na inicialização.
context: zero-doc
