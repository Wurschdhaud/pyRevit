title:
  en_us: Convert line styles
  ko: 선 스타일 변환
  fr_fr: Changer les styles de lignes
  ru: Конвертировать стили линий
  chinese_s: 转换线样式
  es_es: Convertir estilos de línea
  de_de: Linienstile konvertieren
  pt_br: Converter Estilos de Linha
tooltip:
  en_us: >-
    This is a tool to convert line styles. Run the tool,
    select a line with the style to be replaced, and then
    select a line with the interfacetypes style
    The script will correct the line styles in the model
    HOWEVER the lines that are part of a group will not be affected
    Also see the "Shake Filled Regions" tool
  ko: 선 스타일을 변환하는 도구입니다. 도구를 실행하고 교체할 스타일의 선을 선택한 다음 대상 스타일의 선을 선택합니다. 스크립트가 모델의 선 스타일을 수정하지만 그룹에 속한 선은 영향을 받지 않습니다. "채워진 영역 흔들기" 도구도 참조하세요.
  fr_fr: >-
    Il s'agit d'un outil pour convertir les styles de ligne. Exécutez l'outil,
    sélectionnez une ligne avec le style à remplacer, puis
    sélectionnez le style de ligne souhaité.
    Le script corrigera les styles de ligne dans le modèle
    TOUTEFOIS, les lignes faisant partie d'un groupe ne seront pas affectées
    Voir également l'outil "Shake Filled Regions"
  ru: >-
    Данный инструмент конвертирует стили линий. Запустите инструмент,
    выберите линию со стилем, который нужно заменить, а затем выберите  строку со стилем типа интерфейса. Скрипт исправит стили линий в модели.
    ОДНАКО, линии, которые являются частью группы, не будут затронуты. См. также  инструмент "Встряхнуть заполненные области".
  chinese_s: 这是一个转换线样式的工具。运行工具，选择一条具有待替换样式的线，然后选择一条具有目标类型的线。脚本将修正模型中的线样式，但属于组一部分的线不会受影响。另请参见“刷新填充区域”工具
  es_es: >-
    Esta es una herramienta para convertir estilos de línea. Ejecute la herramienta,
    seleccione una línea con el estilo a reemplazar, y luego
    seleccione una línea con el estilo de tipos de interfaz
    El script corregirá los estilos de línea en el modelo
    SIN EMBARGO, las líneas que son parte de un grupo no se verán afectadas
    Ver también la herramienta "Regenerar regiones rellenas"
  de_de: >-
    Beim Ausführen dieses Werkzeugs öffnet sich ein Dialogfenster mit zwei
    Spalten, die jeweils die im aktiven Projekt verfügbaren Linienstile anzeigen.  Auf der Linken Seite sind die Linienstile die in einen Linienstil auf der rechten
    Seite umgewandelt werden. Durch markieren von Zeilen auf beiden Seiten, können mit  einem Klick auf den Button Convert Selected Styles Konvertierungspärchen gebildet werden, die
    darunter angezeigt werden. Die Hierarchisch untergeordneten Linienstile werden in den
    übergeordnete Linienstil umgewandelt. Linien, die sich in Gruppen befinden, können  mit diesem Skript nicht umgewandelt werden (API Limitation)
    Im unteren Teil stehen diverse Konvrtierungsoptionen zur Auswahl:  1) Detail Linien konvertieren  2) Modelllinien konvertieren
    3) Linien in gefüllten Bereichen konvertieren (Gefüllte Bereiche müssen mit dem  pyRevit Werkzeug "Gefüllte Bereiche regenerieren" aktualisiert werden)
    4) Achtung: Gruppierte Linien werden nicht unterstützt!
    5) Linienstil(e) nach dem Konvertieren löschen
  pt_br: >-
    Esta é uma ferramenta para converter estilos de linha. Execute a ferramenta, selecione uma 
    linha com o estilo a ser substituído e, em seguida, selecione uma linha com o estilo desejado. 
    O script corrigirá os estilos de linha no modelo. NO ENTANTO, as linhas que fazem parte de um 
    grupo não serão afetadas. Veja também a ferramenta "Atualizar Regiões Preenchidas"
