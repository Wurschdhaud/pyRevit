title:
  en_us: Change element type safely
  ko: 요소 유형 안전하게 변경
  fr_fr: Changer le type d'élément de façon sécuritaire
  ru: Безопасно изменить тип элемента
  chinese_s: 安全更改图元类型
  es_es: Cambiar tipo de elemento de forma segura
  de_de: Elementtyp auf sichere Weise ändern
  pt_br: Alterar Tipo de Elemento com Segurança
tooltip:
  en_us: >-
    Changes element type of the selected elements to a the element type of a picked element, while maintaining the values of all instance parameters. First select all the elements that you want to change the type for and run this tool. Then select the element that has the source element type
  ko: 선택한 요소의 요소 유형을 선택한 요소의 요소 유형으로 변경하면서 모든 인스턴스 매개변수 값을 유지합니다. 먼저 유형을 변경할 모든 요소를 선택하고 이 도구를 실행합니다. 그런 다음 원본 요소 유형이 있는 요소를 선택합니다.
  fr_fr: >-
    Changer le type des éléments sélectionnés par le type de l'élément sélectionné, tout en maintenant les valeurs des paramètres d'occurence. Sélectionnez tous les éléments dont vous souhaitez changer le type et lancer l'outil. Puis sélectionner le type d'élément source.
  ru: >-
    Изменяет тип выбранных элементов на тип выбранного элемента, сохраняя при этом значение всех параметров экземпляра. Сначала выберите все элементы, для которых вы хотите изменить тип, и запустите этот инструмент. Затем выберите элемент с типом исходного элемента.
  chinese_s: 将选定图元的类型更改为所拾取图元的类型，同时保留所有实例参数的值。首先选择所有需要更改类型的图元并运行此工具，然后选择具有源图元类型的图元
  es_es: >-
    Cambia el tipo de elemento de los elementos seleccionados al tipo de elemento de un elemento seleccionado, manteniendo los valores de todos los parámetros de instancia. Primero seleccione todos los elementos para los que desea cambiar el tipo y ejecute esta herramienta. Luego seleccione el elemento que tiene el tipo de elemento fuente
  de_de: >-
    Markieren Sie zunächst alle Elemente, deren Typ Sie ändern möchten und führen Sie dann dieses Skript aus. Danach müssen Sie auf das Element klicken, das dem gewünschten Typ entspricht. Mit diesem Werkzeug bleiben alle Exemplarparameter beim  Ändern des Typs erhalten!
  pt_br: >-
    Altera o tipo de elemento dos elementos selecionados para o tipo de elemento de um elemento escolhido, mantendo os valores de todos os parâmetros de instância. Primeiro, selecione todos os elementos para os quais você deseja alterar o tipo e execute esta ferramenta. Em seguida, selecione o elemento que possui o tipo de elemento de origem
context: selection
